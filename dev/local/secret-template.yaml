# Provider-credential Secrets the backend reads in the agent-sessions namespace.
#
# HOW TO USE:
#   1. cp dev/local/secret-template.yaml dev/local/secret.local.yaml   (gitignored)
#   2. Fill in the keys you actually have (ALL keys are OPTIONAL — the session
#      pod starts fine before these Secrets exist; missing keys just mean the
#      corresponding env var is unset).
#   3. KUBECONFIG=dev/local/.kubeconfig kubectl apply -f dev/local/secret.local.yaml
#
# These are the env vars the runner picks up from each key:
#   opencode-credentials:
#     anthropic-api-key -> ANTHROPIC_API_KEY
#     openai-api-key    -> OPENAI_API_KEY
#     opencode-api-key  -> OPENCODE_API_KEY
#   anthropic-credentials:
#     api-key           -> CLAUDE_CODE_OAUTH_TOKEN   (an OAuth token, despite the key name)
#
# DO NOT commit real keys. This template ships placeholders only; the filled copy
# (dev/local/secret.local.yaml) is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: opencode-credentials
  namespace: agent-sessions
type: Opaque
# Uncomment only the keys you actually have and fill in real values. Applied
# as-is (all commented), this yields an empty Secret — harmless: the runner just
# leaves the corresponding env vars unset and the integration suite stays in its
# plumbing-only mode.
stringData: {}
  # anthropic-api-key: "sk-ant-..."
  # openai-api-key: "sk-..."
  # opencode-api-key: "..."
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-credentials
  namespace: agent-sessions
type: Opaque
stringData: {}
  # An Anthropic OAuth token (CLAUDE_CODE_OAUTH_TOKEN), not an x-api-key.
  # api-key: "sk-ant-oat01-..."
