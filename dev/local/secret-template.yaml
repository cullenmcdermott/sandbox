# Provider-credential Secrets the backend reads in the agent-sessions namespace.
#
# HOW TO USE:
#   1. cp dev/local/secret-template.yaml dev/local/secret.local.yaml   (gitignored)
#   2. chmod 600 dev/local/secret.local.yaml   (it will hold plaintext keys — keep
#      it owner-only; `opencode-creds.sh` warns + tightens it if left group/world
#      readable)
#   3. Fill in the keys you actually have.
#      NOTE: for the OPENCODE (opencode-server) backend a session pod now
#      references EXACTLY ONE provider key (the selected provider, default
#      Anthropic) and that ref is FAIL-CLOSED — if the selected key is missing the
#      pod stalls in CreateContainerConfigError. So the opencode-credentials key
#      your opencode sessions use is effectively required, not optional. The
#      claude backend's anthropic-credentials keys remain optional.
#   4. KUBECONFIG=dev/local/.kubeconfig kubectl apply -f dev/local/secret.local.yaml
#
# These are the env vars the runner picks up from each key:
#   opencode-credentials:
#     anthropic-api-key -> ANTHROPIC_API_KEY
#     openai-api-key    -> OPENAI_API_KEY
#     opencode-api-key  -> OPENCODE_API_KEY
#   anthropic-credentials:
#     api-key           -> CLAUDE_CODE_OAUTH_TOKEN   (an OAuth token, despite the key name)
#
# DO NOT commit real keys. This template ships placeholders only; the filled copy
# (dev/local/secret.local.yaml) is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: opencode-credentials
  namespace: agent-sessions
type: Opaque
# Uncomment only the keys you actually have and fill in real values. Applied
# as-is (all commented) this yields an empty Secret: fine for claude-only local
# dev (its refs are optional), but an opencode-server session's provider ref is
# fail-closed — its pod will not start until the selected provider key exists here.
stringData: {}
  # anthropic-api-key: "sk-ant-..."
  # openai-api-key: "sk-..."
  # opencode-api-key: "..."
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-credentials
  namespace: agent-sessions
type: Opaque
stringData: {}
  # An Anthropic OAuth token (CLAUDE_CODE_OAUTH_TOKEN), not an x-api-key.
  # api-key: "sk-ant-oat01-..."
