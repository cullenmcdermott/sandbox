# golangci-lint v2 configuration. GREEN on the current tree. Generated files
# (// Code generated …) are auto-excluded by the `generated: lax` default. The
# version here is the same one Flox pins (.flox/env/manifest.toml) and CI installs,
# so `just lint` runs the identical linters locally and in CI.
#
# Enabled: errcheck, govet, ineffassign, unused, staticcheck (SA/S/QF/ST) +
# gofmt/goimports formatting. The only carve-outs are two SA1019 deprecations that
# cannot be migrated cleanly today (see the exclusion rules below).
version: "2"

run:
  # Lint build-tagged files too (e.g. the `e2e` CLI↔runner smoke test).
  build-tags:
    - e2e

linters:
  # Start from an empty set and opt in.
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused
    - staticcheck
  exclusions:
    generated: lax
    paths:
      # npm packages occasionally vendor Go (e.g. flatted); never our concern.
      - runner/node_modules
    presets:
      # Don't gate on unchecked errors from fmt.Print*/Write-to-buffer/etc.
      - std-error-handling
    rules:
      # Tests routinely ignore errors on teardown/fixtures; don't gate on that.
      - path: _test\.go
        linters:
          - errcheck
      # SA1019: agent-sandbox v0.4.6's generated fake only exposes the (now
      # client-gen-deprecated) NewSimpleClientset — NewClientset is NOT generated
      # at this version, so we can't migrate. Revisit on an agent-sandbox bump.
      - linters:
          - staticcheck
        text: "SA1019:.*NewSimpleClientset is deprecated"
      # SA1019: go/parser.ParseDir is deprecated for go/packages; the migration is
      # heavy and out of scope for the lint ratchet. Tracked as a follow-up.
      - linters:
          - staticcheck
        text: "SA1019:.*ParseDir"

formatters:
  enable:
    - gofmt
    - goimports
