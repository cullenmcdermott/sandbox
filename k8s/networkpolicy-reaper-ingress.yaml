# Ingress exception for the idle reaper — the THIRD NetworkPolicy piece.
#
# `networkpolicy-default-deny.yaml` denies ALL ingress to session pods, which
# also blocks the reaper Job (running in `agent-reaper`, see reaper-rbac.yaml)
# from polling the runner's `GET /sessions/:id/idle` endpoint on :8787 by pod
# IP. NetworkPolicies are additive: this policy ADDS back exactly that path —
# reaper pods in `agent-reaper` → session pods on TCP 8787 — and nothing else.
# Without it the reaper's polls time out and sessions are never auto-suspended.
#
# (The CLI's own access to :8787 is a `kubectl port-forward`-style tunnel
# through the API server, which NetworkPolicy does not see — only the reaper
# talks to the pod IP directly.)
#
# The namespaceSelector relies on the automatic `kubernetes.io/metadata.name`
# label (Kubernetes >= 1.22). The podSelector narrows the exception to pods
# labeled as the reaper (buildReaperJob sets `app.kubernetes.io/name:
# sandbox-reaper`; see internal/k8s/reaper.go).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: reaper-ingress-allow
  namespace: agent-sessions
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-reaper
          podSelector:
            matchLabels:
              app.kubernetes.io/name: sandbox-reaper
      ports:
        - protocol: TCP
          port: 8787
