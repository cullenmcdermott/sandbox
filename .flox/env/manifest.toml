schema-version = "1.12.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
# The FULL dev/CI toolchain is pinned here so nothing leaks from the laptop
# (host Homebrew/nix-darwin tools can drift from these versions). `just doctor`
# fails if a required tool resolves outside $FLOX_ENV. The Docker DAEMON is NOT
# pinnable here — it's Colima on the host (a prereq); only the `docker` CLI
# (docker-client) is pinned. Hall (image delivery) is a host daemon, also not here.
[install]
# Language toolchains (match go.mod / the runner's Node engine).
go.pkg-path = "go"
go.version = "^1.26.2"
gcc.pkg-path = "gcc"
git.pkg-path = "git"
nodejs.pkg-path = "nodejs"
# Local KIND dev cluster: ctlptl owns the cluster lifecycle, kind is the product,
# docker-client is the CLI (daemon = Colima), tilt is the live-dev loop.
kind.pkg-path = "kind"
ctlptl.pkg-path = "ctlptl"
docker-client.pkg-path = "docker-client"
tilt.pkg-path = "tilt"
cri-tools.pkg-path = "cri-tools"
kubectl.pkg-path = "kubectl"
kubernetes-helm.pkg-path = "kubernetes-helm"
mutagen.pkg-path = "mutagen"
# CI tooling — pin golangci-lint to the exact CI version so its v2 config schema
# (.golangci.yml) can't drift on a `flox upgrade`. jq is used by recipes/scripts.
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "2.12.2"
jq.pkg-path = "jq"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = """
  # Autogenerated by Flox

  # Point GOENV to Flox environment cache
  export GOENV="$FLOX_ENV_CACHE/goenv"

  # Install Go dependencies
  go get .

  # End autogenerated by Flox
"""


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
# common = '''
#   gum style \
#   --foreground 212 --border-foreground 212 --border double \
#   --align center --width 50 --margin "1 2" --padding "2 4" \
#     $INTRO_MESSAGE
# '''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
# myservice.command = "python3 -m http.server"


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
