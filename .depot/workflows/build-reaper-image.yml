# Depot build + publish of the reaper image (the static Go `sandbox reap` binary on
# distroless/static). Unlike the runner image this is pure Go, so we cross-compile
# both arch binaries with the pinned Flox toolchain (Go cross-compiles natively —
# faster and flake-free vs QEMU) and let Depot assemble the multi-arch manifest.
# Dockerfile.reaper copies dist/sandbox-linux-${TARGETARCH}, which buildkit sets per
# platform, so both binaries must exist in the build context first.
name: Build Reaper Image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile.reaper'
      - '.depot/workflows/build-reaper-image.yml'
      - 'depot.json'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile.reaper'
      - '.depot/workflows/build-reaper-image.yml'
      - 'depot.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # OIDC token for depot/build-push-action

env:
  IMAGE: ghcr.io/cullenmcdermott/sandbox-reaper
  FLOX_DISABLE_METRICS: "true"
  GOMODCACHE: /home/runner/.cache/go/pkg/mod
  GOCACHEPROG: depot gocache

jobs:
  build:
    name: Build and Push
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '.flox/env/manifest.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go/pkg/mod
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-

      - name: Install Flox
        run: |
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix profile add \
            --experimental-features "nix-command flakes" \
            --accept-flake-config \
            'github:flox/flox/v1.12.2'

      - name: Cross-compile reaper binaries (amd64 + arm64)
        run: |
          flox activate -- bash -euo pipefail -c '
            ldflags="-s -w -X github.com/cullenmcdermott/sandbox/internal/cli.Version=${GITHUB_SHA::7}"
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
                go build -trimpath -ldflags="$ldflags" \
                -o "dist/sandbox-linux-$arch" ./cmd/sandbox
            done
          '

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # On Depot CI, GITHUB_TOKEN lacks GHCR package-write — use the org-wide
          # GHCR_TOKEN PAT (same pattern as node-debug-collector / disk-exporter).
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push (multi-arch)
        uses: depot/build-push-action@v1
        with:
          context: .
          file: Dockerfile.reaper
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
