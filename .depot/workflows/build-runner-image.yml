# Depot build + publish of the runner image (the TypeScript Claude/OpenCode runner).
#
# Multi-arch (amd64+arm64) via depot/build-push-action — Depot builds each platform
# on a native builder (no QEMU) and caches layers in the project keyed by depot.json.
# On Depot-hosted runners the action authenticates to Depot over OIDC (configure the
# repo's trust relationship via the Depot GitHub App). GHCR push uses GITHUB_TOKEN.
name: Build Runner Image

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - '.depot/workflows/build-runner-image.yml'
      - 'depot.json'
  pull_request:
    paths:
      - 'runner/**'
      - '.depot/workflows/build-runner-image.yml'
      - 'depot.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # OIDC token for depot/build-push-action

env:
  IMAGE: ghcr.io/cullenmcdermott/sandbox-claude-runner

jobs:
  build:
    name: Build and Push
    runs-on: depot-ubuntu-24.04
    # Surface the pushed manifest digest so consumers can digest-pin
    # (image@sha256:…) instead of trusting tag stability.
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # On Depot CI, GITHUB_TOKEN lacks GHCR package-write — use the org-wide
          # GHCR_TOKEN PAT (same pattern as node-debug-collector / disk-exporter).
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        uses: depot/build-push-action@v1
        with:
          context: runner
          platforms: linux/amd64,linux/arm64
          # Only publish from main; PRs build both arches to catch breakage.
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Emit pushed manifest digest
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Runner image published"
            echo ""
            echo "- ref: \`${IMAGE}:${GITHUB_SHA}\`"
            echo "- manifest digest: \`${DIGEST}\`"
            echo "- digest-pinned: \`${IMAGE}@${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed ${IMAGE}@${DIGEST}"
