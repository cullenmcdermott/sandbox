# Depot CI build+publish of the runner image. Moved off GitHub Actions as part of
# the clean cut to Depot.
#
# CHANGED FROM THE GHA VERSION (review for your setup):
#   - runs-on: kubevirt-runners (self-hosted homelab) -> depot-ubuntu-24.04 (Depot cloud).
#   - DROPPED the Tailscale step: it joined the tailnet for the self-hosted runner;
#     a Depot cloud runner reaches the PUBLIC ghcr.io directly, and the base images
#     (node:24-slim, distroless) are public. Re-add Tailscale only if the build
#     genuinely needs a tailnet-internal resource.
#   - Consider `depot/build-push-action` for faster, cached builds on Depot.
name: Build Runner Image

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - '.depot/workflows/build-runner-image.yml'
  pull_request:
    paths:
      - 'runner/**'
      - '.depot/workflows/build-runner-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/cullenmcdermott/sandbox-claude-runner

jobs:
  build:
    name: Build and Push
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
